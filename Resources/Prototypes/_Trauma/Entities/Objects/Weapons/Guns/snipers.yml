- type: entity
  abstract: true
  parent: BaseWeaponSniperNoAmmo
  id: BaseWeaponSniper
  components:
  - type: BallisticAmmoProvider
    autoCycle: false
    capacity: 10
    proto: CartridgeLightRifle
    whitelist:
      tags:
      - CartridgeLightRifle
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
  abstract: true
  parent: [ BaseWeaponSniperNoAmmo, BaseGunWieldable ]
  id: BaseWeaponSniperMagazine
  components:
  - type: Item
    sprite: Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
    size: Huge
    shape:
    - 0,0,6,1
    storedRotation: 45
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineAntiMateriel
        insertSound: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineAntiMateriel
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeAntiMateriel
        priority: 1
        whitelist:
          tags:
          - CartridgeAntiMateriel
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
