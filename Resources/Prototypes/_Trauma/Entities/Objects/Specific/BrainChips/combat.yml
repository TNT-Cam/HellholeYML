- type: entity
  abstract: true
  parent: [ BaseSkillChip, BaseSecurityContraband ]
  id: BaseSkillChipWeapons
  description: A skill chip with the same effect of bootcamp training for a single weapon class.

# Melee

- type: entity
  parent: BaseSkillChipWeapons
  id: SkillChipUnarmed
  name: skill chip (unarmed training)
  components:
  - type: KnowledgeGrantOnWear
    skills:
      MeleeKnowledge: 60

