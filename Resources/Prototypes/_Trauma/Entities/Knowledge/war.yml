# Melee Combat

- type: entity
  abstract: true
  parent: BaseWarKnowledge
  id: BaseKnowledgeWeaponsMelee
  components:
  - type: Knowledge
    category: MeleeCombat
    costs: [0, 1, 3, 6] # reasonable that you could get good at a random melee style

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: MeleeKnowledge # holdover
  name: Unarmed Training
  description: How good you are at punching others, usually with your bare hands or claws.
  components:
  - type: Knowledge
    costs: [0, 1, 2, 3] # lots of people get in fights

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsBludgeon
  name: Bludgeons Training
  description: Swinging heavy clubs, bats and what not really fast hurts your foes.

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsKnife
  name: Knife Training
  description: Using knives and other small blades effectively needs quick and powerful stabs and cuts.
  components:
  - type: Knowledge
    costs: [0, 1, 2, 3] # knives are really common

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsSword
  name: Sword Training
  description: Large blades are best used by stabbing and slashing your enemies, with enough heft to even parry attacks.

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsPolearm
  name: Polearm Training
  description: Humanity started putting pokey bits on sticks tens of thousands of years ago. Puncture your foes with strong thrusts.

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsNonLethal
  name: Non-lethals Training
  description: It takes skill to attack someone. It takes more to attack without killing, like with stun batons or disablers.

- type: entity
  parent: BaseKnowledgeWeaponsMelee
  id: KnowledgeWeaponsTool
  name: Tool Combat Training
  description: Most laymen think it's easy to fight with hedge trimmers and nailguns, a real tradie knows the secret to it.

# Ranged Combat

- type: entity
  abstract: true
  parent: BaseWarKnowledge
  id: BaseKnowledgeWeaponsRanged
  components:
  - type: Knowledge
    category: RangedCombat
    costs: [0, 2, 4] # harder to be trained with assault rifles and shit as a random assistant

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: ShootingKnowledge # not training
  name: Marksmanship
  description: How good your aim is with most guns. Training with the relevant weapon is much better, but a good eye puts you ahead of the rest.
  components:
  - type: AimSpeedKnowledge
    # [-5%, +12%] neutral at lvl 28
    curve: !type:RootSkillCurve
      skillOffset: 2.5
      curveScale: 0.6

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsPistol
  name: Pistol Training
  description: How good you are with one-handed ballistics. Mostly magazines and revolver cylinders.

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsRifle
  name: Rifle Training
  description: How good you are with ballistic long arms like assault rifles and mosins.

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsShotgun
  name: Shotgun Training
  description: You know why I use the shotgun? The shotgun doesn't miss.

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsSniper
  name: Sniper Training
  description: "How well you can snipe using a scoped rifle at long range. 🦋"
  components:
  - type: Knowledge
    costs: [0, 3, 6] # not exactly common

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsHeavy
  name: Heavy Weapons Training
  description: I am heavy weapons guy... and this, is my heavy weapon.
  components:
  - type: Knowledge
    costs: null # my sparkledog med intern actually used to be an isis rocketeer

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsLaser
  name: Lasers Training
  description: Laser weapons have little recoil, what matters more is heat management. NanoTrasen's choice purely for its low cost.

- type: entity
  parent: BaseKnowledgeWeaponsRanged
  id: KnowledgeWeaponsMining
  name: Mining Tool Training
  description: How good you are with mining weapons, from modded out PKAs to the humble pickaxe.
