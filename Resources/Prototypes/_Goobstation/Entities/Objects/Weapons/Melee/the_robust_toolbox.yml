- type: entity
  parent: [ToolboxBase, BaseSyndicateContraband]
  id: Toolboxrobust
  name: The robust toolbox
  description: The robust toolbox, passed down by generations of shitters. Just by holding it, you feel more robust than ever.
  components:
  - type: WeaponClass
    class: Bludgeon
  - type: MeleeWeapon
    heavyStaminaCost: 0
    damage:
      types:
        Blunt: 35
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
  - type: Sprite
    sprite: Objects/Tools/Toolboxes/toolbox_red.rsi
    state: icon
  - type: Item
    sprite: Objects/Tools/Toolboxes/toolbox_red.rsi
  - type: Execution
    doAfterDuration: 4.0
  - type: Unremoveable

- type: entity
  parent: SingularityHammer
  id: SingulothsHammer
  name: Singuloth's hammer
