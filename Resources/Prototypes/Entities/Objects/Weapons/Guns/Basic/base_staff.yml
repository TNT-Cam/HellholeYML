- type: entity
  id: WeaponStaffBase
  abstract: true
  parent: [BaseItem, BaseMagicalContraband] # Goob edit
  components:
  # <Trauma>
  - type: Clothing
    quickEquip: false
    slots:
      - Back
      - suitStorage
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
      suitstorage:
      - state: equipped-BACKPACK
  - type: StaticPrice
    price: 30000
  - type: Tag
    tags: [ WizardStaff ]
  # </Trauma>
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/staves.rsi
  - type: Item
    heldPrefix: staff
    size: Huge # Goob edit
  - type: Gun
    # <Trauma>
    soundEmpty: null
    soundMode: null
    clumsyProof: true
    fireRate: 1.5
    # <Trauma>
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: AmmoCounter
  # All staves recharge. Wands are not.
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 30
